<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정보앨범</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand-mark" aria-hidden="true">
        <span></span>
      </div>
      <div>
        <h1>정보앨범</h1>
        <p>복싱 훈련, 장비, 경기 정보를 한눈에 찾는 정적 인덱스</p>
      </div>
    </header>

    <main class="layout">
      <aside class="filter-panel" aria-label="검색 및 필터">
        <label class="search-box" for="searchInput">
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="제목, 요약, 태그, 카테고리 검색" autocomplete="off">
        </label>

        <section class="control-group">
          <h2>카테고리</h2>
          <div id="categoryFilters" class="chip-list" aria-label="카테고리 필터"></div>
        </section>

        <section class="control-group">
          <h2>태그</h2>
          <div id="tagFilters" class="chip-list" aria-label="태그 필터"></div>
        </section>

        <section class="control-group sort-group">
          <h2>정렬</h2>
          <select id="sortSelect" aria-label="정렬 방식">
            <option value="newest">최신순</option>
            <option value="oldest">오래된순</option>
          </select>
        </section>
      </aside>

      <section class="content-area" aria-live="polite">
        <div class="result-bar">
          <div>
            <strong id="resultCount">0개</strong>
            <span>결과</span>
          </div>
          <button id="resetButton" type="button">초기화</button>
        </div>

        <div id="cardList" class="card-list"></div>
        <p id="emptyMessage" class="empty-message" hidden>검색 결과가 없습니다. 다른 복싱 키워드나 필터를 선택해보세요.</p>
      </section>
    </main>
  </div>

  <script id="fallbackData" type="application/json">
    [
      {
        "id": 1,
        "title": "복싱 입문자가 처음 준비할 장비",
        "category": "장비",
        "tags": ["글러브", "핸드랩", "입문"],
        "summary": "처음 체육관에 가기 전 준비하면 좋은 기본 장비 정리",
        "date": "2024-05-18",
        "url": "https://example.com/boxing-gear"
      },
      {
        "id": 2,
        "title": "잽과 원투 기본 자세 체크",
        "category": "기술",
        "tags": ["잽", "원투", "기본기"],
        "summary": "초보자가 자주 놓치는 가드, 어깨, 발 위치를 정리한 글",
        "date": "2024-05-15",
        "url": "https://example.com/jab-cross"
      }
    ]
  </script>
  <script src="script.js"></script>
</body>
</html>
