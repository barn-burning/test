<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>정보앨범</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-shell">
    <header class="site-header">
      <div class="brand-mark" aria-hidden="true">
        <span></span>
      </div>
      <div>
        <h1>정보앨범</h1>
        <p>후기와 정보 링크를 한눈에 찾는 정적 인덱스</p>
      </div>
    </header>

    <main class="layout">
      <aside class="filter-panel" aria-label="검색 및 필터">
        <label class="search-box" for="searchInput">
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="제목, 요약, 태그, 카테고리 검색" autocomplete="off">
        </label>

        <section class="control-group">
          <h2>카테고리</h2>
          <div id="categoryFilters" class="chip-list" aria-label="카테고리 필터"></div>
        </section>

        <section class="control-group">
          <h2>태그</h2>
          <div id="tagFilters" class="chip-list" aria-label="태그 필터"></div>
        </section>

        <section class="control-group sort-group">
          <h2>정렬</h2>
          <select id="sortSelect" aria-label="정렬 방식">
            <option value="newest">최신순</option>
            <option value="oldest">오래된순</option>
          </select>
        </section>
      </aside>

      <section class="content-area" aria-live="polite">
        <div class="result-bar">
          <div>
            <strong id="resultCount">0개</strong>
            <span>결과</span>
          </div>
          <button id="resetButton" type="button">초기화</button>
        </div>

        <div id="cardList" class="card-list"></div>
        <p id="emptyMessage" class="empty-message" hidden>검색 결과가 없습니다. 다른 검색어나 필터를 선택해보세요.</p>
      </section>
    </main>
  </div>

  <script id="fallbackData" type="application/json">
    [
      {
        "id": 1,
        "title": "코수술 6개월차 후기",
        "category": "성형",
        "tags": ["코성형", "복코", "재수술"],
        "summary": "6개월차가 된 지금 생각하는 장단점과 회복 과정 정리",
        "date": "2024-05-18",
        "url": "https://example.com/review1"
      },
      {
        "id": 2,
        "title": "여드름 피부 레이저 치료 후기",
        "category": "피부과",
        "tags": ["여드름", "레이저", "피부관리"],
        "summary": "여드름 흉터 때문에 레이저 치료를 받은 후기",
        "date": "2024-05-15",
        "url": "https://example.com/review2"
      }
    ]
  </script>
  <script src="script.js"></script>
</body>
</html>
